version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps
        # Forward Amplify-injected env vars to the Next.js SSR runtime.
        # Amplify only passes app/branch env to the build container by default;
        # writing them to .env.production lets next build inline them so the
        # SSR Lambda sees process.env.* at request time.
        - |
          {
            for var in MONITOR_API_KEY NEXT_PUBLIC_MONITOR_API_KEY CRON_SECRET \
                       SENTRY_AUTH_TOKEN DK_API_KEY DBS_API_KEY \
                       TOVANI_BASE_URL TOVANI_HEALTH_URL TOVANI_SYSTEM_HEALTH_URL TOVANI_COMMS_URL \
                       TOVANI_KHAI_API_KEY GOOGLE_API_KEY \
                       GOOGLE_APPLICATION_CREDENTIALS_JSON \
                       GA4_PROPERTY_ID_DK GA4_PROPERTY_ID_DBS \
                       OPENHEART_AWS_ACCESS_KEY_ID OPENHEART_AWS_SECRET_ACCESS_KEY OPENHEART_AWS_REGION \
                       OPENHEART_SELF_URL OPENHEART_BASIC_AUTH OPENHEART_CRON_TABLE GA4_PROPERTY_ID_TOVANI \
                       NOTIFY_RESEND_API_KEY NOTIFY_EMAIL_TO NOTIFY_EMAIL_FROM \
                       NOTIFY_TWILIO_ACCOUNT_SID NOTIFY_TWILIO_AUTH_TOKEN NOTIFY_TWILIO_FROM NOTIFY_SMS_TO \
                       NOTIFY_SLACK_WEBHOOK \
                       TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_TFN_VERIFICATION_SID \
                       GITHUB_TOKEN OPENHEART_GITHUB_REPOS OPENHEART_S3_PUBLIC_ALLOWLIST \
                       ANTHROPIC_API_KEY FIX_TOKEN_SECRET OPENHEART_AUTOPILOT \
                       DK_CRON_SECRET TOVANI_CRON_SECRET; do
              if [ -n "${!var}" ]; then echo "${var}=${!var}"; fi
            done
          } > .env.production
          echo "wrote $(wc -l < .env.production) env vars to .env.production"
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
